name: Build AcquaOS ISO
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Arch Linux ISO
        uses: anton-shovkoplyas/build-arch-iso@v1
        with:
          config_dir: 'releng'
          # Qui scriviamo i pacchetti direttamente, senza file esterni
          packages: |
            base
            linux
            linux-firmware
            cinnamon
            networkmanager
            sudo
          iso_name: 'AcquaOS-Crystal.iso'

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: AcquaOS-ISO
          path: output/*.iso
