name: Build AcquaOS ISO
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build ISO Inside Arch Container
        run: |
          docker run --privileged --rm -v $(pwd):/workspace -w /workspace archlinux:latest bash -c "
            # 1. Aggiornamento sistema e installazione archiso
            pacman -Syu --noconfirm archiso &&
            
            # 2. Setup profilo releng
            mkdir -p releng &&
            cp -r /usr/share/archiso/configs/releng/* releng/ &&
            
            # 3. Test Minimal: Solo base e linux per verificare se il server regge
            echo 'base linux' > releng/packages.x86_64 &&
            
            # 4. Creazione cartella output
            mkdir -p output &&
            
            # 5. Esecuzione Build (Usiamo /tmp per aggirare i limiti di spazio/permessi)
            mkarchiso -v -w /tmp/work_dir -o output releng/
          "

      - name: Upload ISO
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: AcquaOS-Minimal-ISO
          path: output/*.iso
