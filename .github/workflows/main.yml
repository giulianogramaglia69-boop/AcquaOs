name: Build AcquaOS Final Attempt
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install System Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y arch-install-scripts erofs-utils units libarchive-tools

      - name: Manual Archiso Build
        run: |
          # Scarichiamo mkarchiso come script standalone
          git clone https://gitlab.archlinux.org/archlinux/archiso.git
          
          # Creiamo la struttura
          mkdir -p releng
          cp -r archiso/configs/releng/* releng/
          
          # Pacchetti minimi (solo per vedere se va!)
          echo 'base linux' > releng/packages.x86_64
          
          # Esecuzione diretta bypassando Docker
          mkdir -p output
          sudo ./archiso/archiso/mkarchiso -v -w /tmp/work_dir -o output releng/

      - name: Upload
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: AcquaOS-ISO
          path: output/*.iso
