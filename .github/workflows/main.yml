name: Build AcquaOS ISO
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build ISO via QEMU (Arch Linux)
        uses: remi-dupre/build-arch-iso-action@v1
        with:
          # Configurazione automatica dei pacchetti
          packages: |
            base
            linux
            linux-firmware
            cinnamon
            networkmanager
            sudo
          iso_name: AcquaOS-Crystal.iso

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: AcquaOS-ISO
          path: "*.iso"
