name: Build AcquaOS ISO
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del codice
        uses: actions/checkout@v4

      - name: Espansione spazio disco
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc

      - name: Esecuzione build reale
        run: |
          chmod +x build_acquaos.sh
          ./build_acquaos.sh

      - name: Caricamento ISO Finale
        uses: actions/upload-artifact@v4
        with:
          name: AcquaOS-Crystal-ISO
          path: output/*.iso
